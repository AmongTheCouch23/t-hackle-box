services:
  - type: web
    name: t-hackle-box
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: thacklebox-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /var/data/db.json
